# --- Application ---
spring.application.name=checkout-payment-gateway
server.port=8090

# --- Logging ---
logging.level.com.checkout.payment=DEBUG

# --- Bank simulator client ---
bank.simulator.url=http://localhost:8080/payments

# Resilience4j retry for the bank simulator client (programmatic config)
bank.simulator.retry.max-attempts=3
bank.simulator.retry.initial-interval-ms=500
bank.simulator.retry.backoff-multiplier=2

# --- Payment validation ---
payment.allowed-currencies=GBP,USD,EUR

# --- API docs ---
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
